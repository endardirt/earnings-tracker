<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earnings Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 620px;
      background: #111827;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
    }

    .money-display {
      text-align: center;
      margin-bottom: 25px;
    }

    .money {
      font-size: 3.2rem;
      font-weight: bold;
      color: #4ade80;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .status {
      margin-top: 12px;
      font-size: 1rem;
      opacity: 0.85;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .clock-in {
      background: #22c55e;
      color: white;
    }

    .clock-out {
      background: #ef4444;
      color: white;
    }

    .reset {
      background: #3b82f6;
      color: white;
    }

    .goal-btn {
      background: #8b5cf6;
      color: white;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: #334155;
      color: white;
    }

    .adjust-buttons {
      display: flex;
      gap: 10px;
    }

    .goal-card {
      margin-bottom: 25px;
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .goal-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    .goal-progress {
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 14px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#22c55e,#4ade80);
      transition: width 0.3s ease;
    }

    .goal-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .goal-stat {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
    }

    .goal-label {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .goal-value {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .small {
      text-align: center;
      margin-top: 20px;
      opacity: 0.65;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<div class="app">

  <h1>💰 Earnings Tracker</h1>

  <div class="money-display">
    <div>Current Earnings</div>
    <div class="money" id="money">$0.00</div>
    <div class="status" id="status">Not clocked in</div>
  </div>

  <!-- MOVED HERE -->
  <div class="goal-card">

    <div class="goal-title">🎯 Savings Goal</div>

    <div class="goal-progress">
      <div id="goalProgressText">$0 / $0</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="goal-stats">

      <div class="goal-stat">
        <div class="goal-label">Amount Remaining</div>
        <div class="goal-value" id="remainingAmount">$0.00</div>
      </div>

      <div class="goal-stat">
        <div class="goal-label">Work Time Remaining</div>
        <div class="goal-value" id="remainingTime">0h 0m</div>
      </div>

      <div class="goal-stat">
        <div class="goal-label">8-Hour Work Days Remaining</div>
        <div class="goal-value" id="remainingDays">0 days</div>
      </div>

      <div class="goal-stat">
        <div class="goal-label">Goal Completion</div>
        <div class="goal-value" id="goalPercent">0%</div>
      </div>

    </div>

  </div>

  <div class="controls">
    <button class="clock-in" id="clockInBtn">Clock In</button>
    <button class="clock-out" id="clockOutBtn">Clock Out</button>
    <button class="reset" id="resetBtn">Clear</button>
  </div>

  <div class="settings">

    <div class="field">
      <label>Hourly Wage ($)</label>
      <input type="number" id="hourlyWage" value="20" step="0.01">
    </div>

    <div class="field">
      <label>Set Current Amount ($)</label>
      <input type="number" id="setAmount" value="0" step="0.01">
    </div>

    <div class="field">
      <button class="reset" id="applyAmountBtn">Set Amount</button>
    </div>

    <div class="field">
      <label>Add / Remove Amount ($)</label>
      <input type="number" id="adjustAmount" value="10" step="0.01">
    </div>

    <div class="adjust-buttons">
      <button class="clock-in" id="addMoneyBtn">+ Add Money</button>
      <button class="clock-out" id="removeMoneyBtn">- Remove Money</button>
    </div>

    <div class="field">
      <label>Savings Goal ($)</label>
      <input type="number" id="goalAmount" value="1000" step="0.01">
    </div>

    <div class="field">
      <button class="goal-btn" id="setGoalBtn">Save Goal</button>
    </div>

  </div>

  <div class="small">
    Your earnings automatically save.<br>
    If you're clocked in, earnings continue while the page is closed.
  </div>

</div>

<script>

const STORAGE_KEY = "earningsTrackerData";

let data = {
  totalMoney: 0,
  hourlyWage: 20,
  clockedIn: false,
  clockInStart: null,
  decimals: 2,
  goalAmount: 1000
};

const saved = localStorage.getItem(STORAGE_KEY);

if (saved) data = JSON.parse(saved);

if (data.decimals === undefined) data.decimals = 2;
if (data.goalAmount === undefined) data.goalAmount = 1000;

const moneyEl = document.getElementById("money");
const statusEl = document.getElementById("status");

const wageInput = document.getElementById("hourlyWage");
const setAmountInput = document.getElementById("setAmount");
const goalInput = document.getElementById("goalAmount");

wageInput.value = data.hourlyWage;
setAmountInput.value = data.totalMoney.toFixed(2);
goalInput.value = data.goalAmount;

const settings = document.querySelector(".settings");

const decimalField = document.createElement("div");
decimalField.className = "field";
decimalField.innerHTML = `
<label>Visible Decimal Places</label>
<input type="number" id="decimalPlaces" min="0" max="10" value="${data.decimals}">
`;
settings.appendChild(decimalField);

const decimalInput = document.getElementById("decimalPlaces");

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getCurrentMoney() {
  if (!data.clockedIn || !data.clockInStart) return data.totalMoney;
  const elapsedMs = Date.now() - data.clockInStart;
  return data.totalMoney + (elapsedMs * (data.hourlyWage / 3600000));
}

function updateGoalDisplay(currentMoney) {

  const goal = data.goalAmount;
  const remaining = Math.max(0, goal - currentMoney);

  const percent = goal > 0 ? Math.min(100, (currentMoney / goal) * 100) : 0;

  const hoursRemaining = data.hourlyWage > 0 ? remaining / data.hourlyWage : 0;
  const h = Math.floor(hoursRemaining);
  const m = Math.round((hoursRemaining - h) * 60);
  const days = Math.ceil(hoursRemaining / 8);

  document.getElementById("goalProgressText").textContent =
    `$${currentMoney.toFixed(2)} / $${goal.toFixed(2)}`;

  document.getElementById("remainingAmount").textContent =
    `$${remaining.toFixed(2)}`;

  document.getElementById("remainingTime").textContent =
    remaining <= 0 ? "Goal Reached 🎉" : `${h}h ${m}m`;

  document.getElementById("remainingDays").textContent =
    remaining <= 0 ? "0 days" : `${days} days`;

  document.getElementById("goalPercent").textContent =
    percent.toFixed(1) + "%";

  document.getElementById("progressFill").style.width =
    percent + "%";
}

function updateDisplay() {

  const currentMoney = getCurrentMoney();

  moneyEl.textContent = "$" + currentMoney.toFixed(data.decimals);

  statusEl.innerHTML = data.clockedIn
    ? '<span class="live-dot"></span>Clocked In'
    : "Not clocked in";

  updateGoalDisplay(currentMoney);
}

setInterval(updateDisplay, 50);

document.getElementById("clockInBtn").onclick = () => {
  if (!data.clockedIn) {
    data.clockedIn = true;
    data.clockInStart = Date.now();
    saveData();
  }
};

document.getElementById("clockOutBtn").onclick = () => {
  if (data.clockedIn) {
    data.totalMoney = getCurrentMoney();
    data.clockedIn = false;
    data.clockInStart = null;
    saveData();
  }
};

document.getElementById("resetBtn").onclick = () => {
  data.totalMoney = 0;
  if (data.clockedIn) data.clockInStart = Date.now();
  setAmountInput.value = 0;
  saveData();
};

document.getElementById("applyAmountBtn").onclick = () => {
  data.totalMoney = parseFloat(setAmountInput.value) || 0;
  if (data.clockedIn) data.clockInStart = Date.now();
  saveData();
};

document.getElementById("addMoneyBtn").onclick = () => {
  const amt = parseFloat(document.getElementById("adjustAmount").value) || 0;
  data.totalMoney = getCurrentMoney() + amt;
  if (data.clockedIn) data.clockInStart = Date.now();
  setAmountInput.value = data.totalMoney.toFixed(2);
  saveData();
};

document.getElementById("removeMoneyBtn").onclick = () => {
  const amt = parseFloat(document.getElementById("adjustAmount").value) || 0;
  data.totalMoney = Math.max(0, getCurrentMoney() - amt);
  if (data.clockedIn) data.clockInStart = Date.now();
  setAmountInput.value = data.totalMoney.toFixed(2);
  saveData();
};

document.getElementById("setGoalBtn").onclick = () => {
  data.goalAmount = parseFloat(goalInput.value) || 0;
  saveData();
};

wageInput.oninput = () => {
  data.totalMoney = getCurrentMoney();
  data.hourlyWage = parseFloat(wageInput.value) || 0;
  if (data.clockedIn) data.clockInStart = Date.now();
  saveData();
};

decimalInput.oninput = () => {
  let v = parseInt(decimalInput.value);
  if (isNaN(v)) v = 2;
  data.decimals = Math.max(0, Math.min(10, v));
  saveData();
};

updateDisplay();
setInterval(saveData, 5000);

</script>

</body>
</html>
