<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earnings Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: #111827;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
    }

    .money-display {
      text-align: center;
      margin-bottom: 25px;
    }

    .money {
      font-size: 3.2rem;
      font-weight: bold;
      color: #4ade80;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .status {
      margin-top: 12px;
      font-size: 1rem;
      opacity: 0.85;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .clock-in {
      background: #22c55e;
      color: white;
    }

    .clock-out {
      background: #ef4444;
      color: white;
    }

    .reset {
      background: #3b82f6;
      color: white;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: #334155;
      color: white;
    }

    .small {
      text-align: center;
      margin-top: 20px;
      opacity: 0.65;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<div class="app">

  <h1>💰 Earnings Tracker</h1>

  <div class="money-display">
    <div>Current Earnings</div>
    <div class="money" id="money">$0.00</div>

    <div class="status" id="status">
      Not clocked in
    </div>
  </div>

  <div class="controls">
    <button class="clock-in" id="clockInBtn">Clock In</button>
    <button class="clock-out" id="clockOutBtn">Clock Out</button>
    <button class="reset" id="resetBtn">Clear</button>
  </div>

  <div class="settings">

    <div class="field">
      <label>Hourly Wage ($)</label>
      <input type="number" id="hourlyWage" value="20" step="0.01">
    </div>

    <div class="field">
      <label>Set Current Amount ($)</label>
      <input type="number" id="setAmount" value="0" step="0.01">
    </div>

    <div class="field">
      <button class="reset" id="applyAmountBtn">
        Set Amount
      </button>
    </div>

  </div>

  <div class="small">
    Your earnings automatically save.<br>
    If you're clocked in, earnings continue while the page is closed.
  </div>

</div>

<script>
  // -----------------------------
  // STORAGE KEY
  // -----------------------------
  const STORAGE_KEY = "earningsTrackerData";

  // -----------------------------
  // DEFAULT DATA
  // -----------------------------
  let data = {
    totalMoney: 0,
    hourlyWage: 20,
    clockedIn: false,
    clockInStart: null,
    decimals: 2
  };

  // -----------------------------
  // LOAD SAVED DATA
  // -----------------------------
  const saved = localStorage.getItem(STORAGE_KEY);

  if (saved) {
    data = JSON.parse(saved);
  }

  // fallback if old save exists
  if (data.decimals === undefined) {
    data.decimals = 2;
  }

  // -----------------------------
  // ELEMENTS
  // -----------------------------
  const moneyEl = document.getElementById("money");
  const statusEl = document.getElementById("status");

  const wageInput = document.getElementById("hourlyWage");
  const setAmountInput = document.getElementById("setAmount");

  wageInput.value = data.hourlyWage;
  setAmountInput.value = data.totalMoney.toFixed(2);

  // -----------------------------
  // CREATE DECIMAL INPUT
  // -----------------------------
  const settings = document.querySelector(".settings");

  const decimalField = document.createElement("div");
  decimalField.className = "field";

  decimalField.innerHTML = `
    <label>Visible Decimal Places</label>
    <input
      type="number"
      id="decimalPlaces"
      min="0"
      max="10"
      value="${data.decimals}"
    >
  `;

  settings.appendChild(decimalField);

  const decimalInput = document.getElementById("decimalPlaces");

  // -----------------------------
  // SAVE FUNCTION
  // -----------------------------
  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // -----------------------------
  // LIVE MONEY CALCULATION
  // -----------------------------
  function getCurrentMoney() {

    if (!data.clockedIn || !data.clockInStart) {
      return data.totalMoney;
    }

    const now = Date.now();
    const elapsedMs = now - data.clockInStart;

    const earningsPerMs = data.hourlyWage / 3600000;

    return data.totalMoney + (elapsedMs * earningsPerMs);
  }

  // -----------------------------
  // UPDATE DISPLAY
  // -----------------------------
  function updateDisplay() {

    const currentMoney = getCurrentMoney();

    moneyEl.textContent =
      "$" + currentMoney.toFixed(data.decimals);

    if (data.clockedIn) {
      statusEl.innerHTML =
        '<span class="live-dot"></span>Clocked In';
    } else {
      statusEl.innerHTML = "Not clocked in";
    }
  }

  // -----------------------------
  // LIVE REFRESH
  // -----------------------------
  setInterval(updateDisplay, 50);

  // -----------------------------
  // CLOCK IN
  // -----------------------------
  document.getElementById("clockInBtn").addEventListener("click", () => {

    if (!data.clockedIn) {

      data.clockedIn = true;
      data.clockInStart = Date.now();

      saveData();
      updateDisplay();
    }
  });

  // -----------------------------
  // CLOCK OUT
  // -----------------------------
  document.getElementById("clockOutBtn").addEventListener("click", () => {

    if (data.clockedIn) {

      data.totalMoney = getCurrentMoney();

      data.clockedIn = false;
      data.clockInStart = null;

      saveData();
      updateDisplay();
    }
  });

  // -----------------------------
  // CLEAR
  // -----------------------------
  document.getElementById("resetBtn").addEventListener("click", () => {

    data.totalMoney = 0;

    if (data.clockedIn) {
      data.clockInStart = Date.now();
    }

    setAmountInput.value = 0;

    saveData();
    updateDisplay();
  });

  // -----------------------------
  // SET AMOUNT
  // -----------------------------
  document.getElementById("applyAmountBtn").addEventListener("click", () => {

    data.totalMoney = parseFloat(setAmountInput.value) || 0;

    if (data.clockedIn) {
      data.clockInStart = Date.now();
    }

    saveData();
    updateDisplay();
  });

  // -----------------------------
  // HOURLY WAGE CHANGE
  // -----------------------------
  wageInput.addEventListener("input", () => {

    data.totalMoney = getCurrentMoney();

    data.hourlyWage =
      parseFloat(wageInput.value) || 0;

    if (data.clockedIn) {
      data.clockInStart = Date.now();
    }

    saveData();
    updateDisplay();
  });

  // -----------------------------
  // DECIMAL CHANGE
  // -----------------------------
  decimalInput.addEventListener("input", () => {

    let value = parseInt(decimalInput.value);

    if (isNaN(value)) value = 2;

    value = Math.max(0, Math.min(10, value));

    data.decimals = value;

    saveData();
    updateDisplay();
  });

  // -----------------------------
  // INITIAL DISPLAY
  // -----------------------------
  updateDisplay();

  // -----------------------------
  // AUTO SAVE
  // -----------------------------
  setInterval(saveData, 5000);

</script>

</body>
</html>
